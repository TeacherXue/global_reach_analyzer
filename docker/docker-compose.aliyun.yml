version: '3.8'

services:
  global-reach-analyzer:
    build:
      context: .
      dockerfile: Dockerfile.aliyun  # 使用阿里云镜像源
      args:
        # 构建时传入 API Key（如果需要）
        GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    container_name: global-reach-analyzer
    ports:
      - "3000:80"  # 将容器的 80 端口映射到主机的 3000 端口
    restart: unless-stopped
    networks:
      - global-reach-network

networks:
  global-reach-network:
    driver: bridge

